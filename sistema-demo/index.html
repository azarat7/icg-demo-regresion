<!DOCTYPE html>
<html lang='es'>
<head>
  <meta charset='UTF-8'>
  <title>ICG Sistema de Gestion</title>
  <style>
    body{font-family:Arial,sans-serif;background:#f4f7fa;
         display:flex;justify-content:center;
         align-items:center;height:100vh;margin:0;}
    .card{background:white;padding:40px;border-radius:8px;
          box-shadow:0 2px 12px rgba(0,0,0,.1);width:360px;}
    .logo{color:#3796BF;font-size:28px;font-weight:bold;
          text-align:center;margin-bottom:6px;}
    .sub{color:#607896;text-align:center;
         font-size:13px;margin-bottom:28px;}
    input{width:100%;padding:10px;margin:7px 0;
          border:1px solid #ccc;border-radius:4px;
          box-sizing:border-box;font-size:14px;}
    button{width:100%;padding:12px;background:#3796BF;
           color:white;border:none;border-radius:4px;
           font-size:15px;cursor:pointer;margin-top:8px;}
    button:hover{background:#2a7ba8;}
    #error{color:#C0392B;font-size:13px;text-align:center;
           margin-top:10px;display:none;}
  </style>
</head>
<body>
  <div class='card'>
    <div class='logo'>ICG</div>
    <div class='sub'>Sistema de Gestion Financiera</div>
    <input id='usuario' type='text' placeholder='Usuario'>
    <input id='password' type='password' placeholder='Contrasena'>
    <button id='boton roto' onclick='login()'>Ingresar</button>
    <div id='error'>Credenciales invalidas</div>
  </div>
  <script>
    function login(){
      const u=document.getElementById('usuario').value;
      const p=document.getElementById('password').value;
      if(u==='analista@icg.com'&&p==='Demo2026'){
        window.location.href='dashboard.html';
      }else{
        document.getElementById('error').style.display='block';
      }
    }
  </script>
</body>
</html>
