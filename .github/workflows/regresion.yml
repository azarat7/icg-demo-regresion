name: Regresion Automatizada ICG

on:
  pull_request:
    branches: [ main ]

jobs:
  test-regresion:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Instalar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Crear carpetas necesarias
        run: mkdir -p test-results evidencias

      - name: Limpiar evidencias previas
        # Ahora también limpiamos los archivos .webm (videos)
        run: rm -rf evidencias/*.png evidencias/*.webm test-results/*.xml 
        
      - name: Ejecutar tests de regresion
        run: pytest tests/regresion/ -v --junitxml=test-results/junit.xml
           
