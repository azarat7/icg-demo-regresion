name: Regresion Automatizada ICG

on:
  pull_request:
    branches: [ main ]

jobs:
  test-regresion:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Instalar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Crear carpetas necesarias
        run: mkdir -p test-results evidencias

      - name: Limpiar evidencias previas
        run: rm -rf evidencias/*.png evidencias/*.webm test-results/*.xml

      - name: Ejecutar tests y publicar en Xray
        run: pytest tests/regresion/ -v --junitxml=test-results/junit.xml --xray-upload
        env:
          XRAY_CLIENT_ID: ${{ secrets.XRAY_CLIENT_ID }}
          XRAY_CLIENT_SECRET: ${{ secrets.XRAY_CLIENT_SECRET }}

      - name: Capturar XRAY_EXECUTION_KEY
        if: always()
        run: |
          KEY=$(cat test-results/junit.xml | grep -oP 'XRAY_EXECUTION_KEY=\K[^ <"]+' | head -1 || echo "")
          if [ -z "$KEY" ]; then
            KEY=$(curl -s -X POST \
              'https://xray.cloud.getxray.app/api/v2/authenticate' \
              -H 'Content-Type: application/json' \
              -d '{"client_id":"'"$XRAY_CLIENT_ID"'","client_secret":"'"$XRAY_CLIENT_SECRET"'"}' \
              | tr -d '"')
            RESPONSE=$(curl -s -X POST \
              'https://xray.cloud.getxray.app/api/v2/import/execution/junit/multipart' \
              -H "Authorization: Bearer $KEY" \
              -F "info=@/tmp/xray-info.json;type=application/json" \
              -F "results=@test-results/junit.xml;type=text/xml" || echo "{}")
            KEY=$(echo $RESPONSE | python3 -c 'import sys,json; d=json.load(sys.stdin); print(d.get("key",""))' 2>/dev/null || echo "")
          fi
          echo "XRAY_EXECUTION_KEY=$KEY" >> $GITHUB_ENV
        env:
          XRAY_CLIENT_ID: ${{ secrets.XRAY_CLIENT_ID }}
          XRAY_CLIENT_SECRET: ${{ secrets.XRAY_CLIENT_SECRET }}

      - name: Adjuntar videos a Xray
        if: always()
        run: python scripts/adjuntar_screenshots.py
        env:
          XRAY_EXECUTION_KEY: ${{ env.XRAY_EXECUTION_KEY }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}

      - name: Subir evidencias a GitHub Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evidencias-PR${{ github.event.pull_request.number }}
          path: |
            evidencias/*.png
            evidencias/*.webm
            test-results/junit.xml
          retention-days: 7