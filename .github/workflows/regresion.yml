name: Regresion Automatizada ICG

on:
  pull_request:
    branches: [ main ]

jobs:
  test-regresion:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Instalar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Crear carpetas necesarias
        run: mkdir -p test-results evidencias

      - name: Limpiar evidencias previas
        run: rm -rf evidencias/*.png evidencias/*.webm test-results/*.xml

      - name: Ejecutar tests de regresion
        run: pytest tests/regresion/ -v --junitxml=test-results/junit.xml

      - name: Autenticar con Xray Cloud
        if: always()
        run: |
          TOKEN=$(curl -s -X POST \
            'https://xray.cloud.getxray.app/api/v2/authenticate' \
            -H 'Content-Type: application/json' \
            -d '{"client_id":"'"$XRAY_CLIENT_ID"'","client_secret":"'"$XRAY_CLIENT_SECRET"'"}' \
            | tr -d '"')
          echo "XRAY_TOKEN=$TOKEN" >> $GITHUB_ENV
        env:
          XRAY_CLIENT_ID: ${{ secrets.XRAY_CLIENT_ID }}
          XRAY_CLIENT_SECRET: ${{ secrets.XRAY_CLIENT_SECRET }}

      - name: Preparar info de ejecucion
        if: always()
        run: |
          cat > /tmp/xray-info.json << 'EOF'
          {
            "fields": {
              "project": { "key": "PRB3103" },
              "summary": "Regresion Automatizada - PR #${{ github.event.pull_request.number }}",
              "description": "Ejecucion automatica disparada por PR hacia main",
              "issuetype": { "name": "Test Execution" }
            }
          }
          EOF

      - name: Publicar resultados en Xray
        if: always()
        run: |
          RESPONSE=$(curl -s -X POST \
            'https://xray.cloud.getxray.app/api/v2/import/execution/junit/multipart' \
            -H "Authorization: Bearer $XRAY_TOKEN" \
            -F "info=@/tmp/xray-info.json;type=application/json" \
            -F "results=@test-results/junit.xml;type=text/xml")
          echo "Respuesta Xray: $RESPONSE"
          echo "XRAY_EXECUTION_KEY=$(echo $RESPONSE | python3 -c 'import sys,json; print(json.load(sys.stdin)["key"])')" >> $GITHUB_ENV
        env:
          XRAY_TOKEN: ${{ env.XRAY_TOKEN }}

      - name: Adjuntar screenshots a Xray
        if: always()
        run: python scripts/adjuntar_screenshots.py
        env:
          XRAY_EXECUTION_KEY: ${{ env.XRAY_EXECUTION_KEY }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}

      - name: Subir evidencias a GitHub Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evidencias-PR${{ github.event.pull_request.number }}
          path: |
            evidencias/*.png
            evidencias/*.webm
            test-results/junit.xml
          retention-days: 7