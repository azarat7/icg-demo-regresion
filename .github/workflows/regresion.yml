name: Regresion Automatizada ICG

on:
  pull_request:
    branches: [ main ]

jobs:
  test-regresion:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Instalar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Crear carpetas necesarias
        run: mkdir -p test-results evidencias

      - name: Limpiar evidencias previas
        run: rm -rf evidencias/*.png evidencias/*.webm test-results/*.xml

      - name: Ejecutar tests y publicar en Xray
        run: |
          pytest tests/regresion/ -v \
            --junitxml=test-results/junit.xml \
            --jira-xray \
            --cloud \
            --client-secret-auth \
            2>&1 | tee test-results/pytest.log
          KEY=$(grep -oP '(?<=Xray execution issue: )PRB3103-\d+' test-results/pytest.log | head -1 || echo "")
          echo "XRAY_EXECUTION_KEY=$KEY" >> $GITHUB_ENV
          echo "Key capturada: $KEY"
        env:
          XRAY_API_BASE_URL: https://xray.cloud.getxray.app
          XRAY_CLIENT_ID: ${{ secrets.XRAY_CLIENT_ID }}
          XRAY_CLIENT_SECRET: ${{ secrets.XRAY_CLIENT_SECRET }}

      - name: Adjuntar evidencias a Xray
        if: always()
        run: python scripts/adjuntar_screenshots.py
        env:
          XRAY_EXECUTION_KEY: ${{ env.XRAY_EXECUTION_KEY }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}

      - name: Subir evidencias a GitHub Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evidencias-PR${{ github.event.pull_request.number }}
          path: |
            evidencias/*.png
            evidencias/*.webm
            test-results/junit.xml
            test-results/pytest.log
          retention-days: 7