      # ─────────────────────────────────────────────────────────────────────

      - name: Subir evidencias a GitHub Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evidencias-PR${{ github.event.pull_request.number }}
          # Aseguramos que capture tanto fotos (.png) como videos (.webm)
          path: |
            evidencias/*.png
            evidencias/*.webm
            test-results/junit.xml
          retention-days: 7